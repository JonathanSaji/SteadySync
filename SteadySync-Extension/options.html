<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>SteadySync Settings</h1>
        <p>Control your co-pilot features below.</p>
    </header>

    <main class="settings-grid">
        <div class="card">
            <h3>Steady Path</h3>
            <p>Smooths mouse tremors</p>
            <label class="switch">
                <input type="checkbox" id="feature-path">
                <span class="slider"></span>
            </label>
        </div>

        <div class="card"><h3>Magnetic Snapping</h3> </div>
        <div class="card"><h3>Big Buttons</h3> </div>
        <div class="card"><h3>High Contrast</h3> </div>
        <div class="card"><h3>Reading Ruler</h3> </div>
    </main>

    <script src="options.js"></script>
</body>
</html>
