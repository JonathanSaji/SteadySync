<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        
        <section id="login-view" style="display: none; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center;">
            <div class="card" style="width: 100%; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 20px; background: var(--surface); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: var(--shadow); backdrop-filter: blur(10px);">
                <div style="font-size: 3rem; margin-bottom: -10px;">🔒</div>
                <h2 style="margin: 0; font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--text-main), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Access Required</h2>
                <p style="margin: 0; font-size: 1.05rem; color: var(--text-main); opacity: 0.8; line-height: 1.5;">Please log in through the website to access your personalized extension preferences.</p>
                <button id="openWebsiteLogin" class="primary-btn" style="margin-top: 10px;">Login on Website</button>
            </div>
        </section>

        <section id="popup-view" style="display: none;">
            <div class="header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img src="icon48.png" alt="Logo" style="width: 40px; height: 40px;">
                    <h1>SteadySync</h1>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="openWebsiteBtn" class="theme-btn" aria-label="Open Website" title="Open Website" style="padding: 6px 10px;">
                        <span>🌐</span>
                    </button>
                    <button id="themeToggle" class="theme-btn" aria-label="Toggle Theme">
                        <span id="themeText">Light Mode</span>
                    </button>
                </div>
            </div>
            <button id="masterBtn" class="big-toggle">SYSTEM OFF</button>
            <button id="goToSettings">Advanced Settings</button>
        </section>

        <section id="settings-view" style="display: none;">
            <div class="header">
                <h2>Settings</h2>
                <button id="backToPopup" style="width: auto; padding: 10px 20px;">Back</button>
            </div>
            <div class="card">
                <span>Steady Mouse</span>
                <div class="toggle-container">
                    <span class="toggle-status" id="path-status">OFF</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="path-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="card">
                <span>Show Hitbox</span>
                <div class="toggle-container">
                    <span class="toggle-status" id="hitbox-status">OFF</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="hitbox-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="card">
                <span>Snap Mode</span>
                <div class="toggle-container">
                    <span class="toggle-status" id="snap-status">OFF</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="snap-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="card">
                <span>Voice Control</span>
                <div class="toggle-container">
                    <span class="toggle-status" id="voice-status">OFF</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="voice-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </section>

    </div>
    <script src="extension.js"></script>
</body>
</html>
