<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        
        <section id="popup-view">
            <div class="header">
                <h1>SteadySync</h1>
                <button id="themeToggle" class="theme-btn" aria-label="Toggle Theme">
                    <span id="themeText">Light Mode</span>
                </button>
            </div>
            <button id="masterBtn" class="big-toggle">SYSTEM OFF</button>
            <button id="goToSettings">Advanced Settings</button>
        </section>

        <section id="settings-view" style="display: none;">
            <div class="header">
                <h2>Settings</h2>
                <button id="backToPopup" style="width: auto; padding: 10px 20px;">Back</button>
            </div>
            <div class="card">
                <span>Steady Path</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="path-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </section>

    </div>
    <script src="extension.js"></script>
</body>
</html>
